<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover: safe-area en iOS (muesca, home indicator) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA: color de barra de sistema en Android/Chrome -->
    <meta name="theme-color" content="#f59e0b" />

    <!-- Metadatos de instalación -->
    <meta name="application-name" content="BarberPRO" />
    <meta name="description" content="Gestión de turnos, clientes e ingresos para tu barbería" />

    <!-- iOS: webapp standalone (sin barra de Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BarberPRO" />

    <!-- Android legacy -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Iconos -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.svg" />

    <title>BarberPRO</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
